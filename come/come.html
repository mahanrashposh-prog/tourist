<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="come.css">
    <title>ورود به گردشگری کایکو </title>
</head>
<body>

    <form>
        <div class="welcom">
            <h1>خوش آمدید</h1>
        </div>
        
        
        <div class="input">
            <input id="name"  type="number" placeholder="نام کاربری (شماره موبایل)">
        </div>
        <div class="input">
            <input id="password" type="password" placeholder="رمز عبور ">
        </div>
        <div class="submit">
            <button id="submit">تایید</button>
        </div>
        <div id="error">
            <h3>نمی توانید وارد حساب خود شوید (به موارد زیر توجه کنید)</h3>
            <p>پس از ورود  ثبت نام خود را انجام دهید </p>
            <p>نام کابری شماره موبایل شما می شود </p>
            <p>رمز عبور تایید شده خود را به درستی وارد نمایید (حساس به حروف بزرگ و کوچک )</p>
        </div>
    </form>
    
</body>
</html>
<script src="come.js"></script>
