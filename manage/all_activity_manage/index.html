<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>مدیر</title>
</head>
<body>
    <div class="all">
        <div class="tours">
            <button>ایجاد تور➕<p>می توانی سفر های جدید که قرار است بروید را اینجا آپلود کنید</p></button>
            <button>ایجاد تور دونگی<p>سفر های دونگی را اینجا آپلود کنید </p></button>
            <button>تور های رزرو شده <p>کسانی که تور را گرفتند را میتوان اطلاعات را دید</p></button>

        </div>
        <div class="users">
            <button id="users">کاربران 👱‍♂️<p>کاربرانی که در سایت شما هستند را میتوان دید </p></button>
            <button id="question">سوالات ❓<p>سوالات و مشکلاتی که کاربران براشون پیش اومده را اینجا جواب دهید </p></button>
            <button>خبر جدید ❗<p>پیام های که قادر هستید برای کابران بفرستید را اینجا درج کنید</p></button>

        </div>
        <div class="change">
            <button>بروز <p>عکس ها یا ویدیو هایی که میخواهید تغییر دهید </p></button>
            <button>حذف<p>محتواهایی که فرستادید را میتوان حذف کرد </p></button>

        </div>

    </div>
    
</body>
</html>
<script src="index.js"></script>
